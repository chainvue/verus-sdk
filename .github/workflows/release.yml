# Release — automated via semantic-release (Conventional Commits).
#
# Zero-touch: every push to `main` runs semantic-release; a releasable change
# (feat → minor, fix → patch; a BREAKING change stays 0.x → minor per
# .releaserc.json releaseRules) computes the next version, updates package.json
# + CHANGELOG.md, publishes, tags, and creates the GitHub release. No releasable
# commits → no-op. Preview with the workflow_dispatch dry-run.
#
# Publish: semantic-release owns versioning only; the actual publish is the
# proven OIDC `pnpm publish` (exec plugin) — @semantic-release/npm runs
# npmPublish:false so no NPM token is needed; provenance via id-token:write.
# (pnpm bumped to 10.34.5 — the OIDC floor is 10.9; 9.15.0 could not.)
#
# CUTOVER (one-time): push the baseline tag `v0.4.1` BEFORE the first main push
# so version computation continues from there (else it jumps to 1.0.0). The
# trusted-publisher registration (package @chainvue/verus-sdk, repo
# chainvue/verus-sdk, workflow release.yml) already applies.
#
# Security: this job holds id-token:write (npm publish rights). Actions are
# SHA-pinned (tag-hijack defense); token scope is least-privilege (contents +
# id-token only; github-plugin comments/labels disabled in .releaserc.json).
# `main` must let GITHUB_TOKEN push the release commit + tag.
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: compute the next version + notes, but do not publish or tag"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write # semantic-release pushes the release commit + tag
      id-token: write # OIDC token for npm trusted publishing (provenance)
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0 # full history + tags: semantic-release needs them

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 26
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (with coverage threshold)
        run: pnpm test:coverage

      - name: Release
        run: >-
          pnpm exec semantic-release
          ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

  smoke:
    needs: release
    if: ${{ github.event_name == 'push' || !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 26
          package-manager-cache: false

      # Validate whatever is currently latest on the registry (new version if
      # this run published; the existing latest on a no-op — harmless recheck).
      - name: Resolve latest published version
        id: v
        run: echo "version=$(npm view @chainvue/verus-sdk version)" >> "$GITHUB_OUTPUT"

      - name: Wait for registry
        run: |
          for i in $(seq 1 30); do
            if npm view "@chainvue/verus-sdk@${{ steps.v.outputs.version }}" version >/dev/null 2>&1; then
              echo "available"; exit 0
            fi
            echo "waiting ($i)"; sleep 5
          done
          echo "version never appeared on registry"; exit 1

      - name: Install from registry into a fresh project (PLAIN NODE consumer probe)
        run: |
          mkdir -p /tmp/smoke && cd /tmp/smoke
          npm init -y >/dev/null
          npm install "@chainvue/verus-sdk@${{ steps.v.outputs.version }}"

      - name: Keygen + offline transfer build + validate under plain node (bigint API)
        run: |
          cd /tmp/smoke
          cat > smoke.cjs <<'EOF2'
          const { VerusSDK } = require("@chainvue/verus-sdk");
          const sdk = new VerusSDK({ network: "testnet" });
          const wif = VerusSDK.generateWif();
          VerusSDK.deriveAddress(wif).then((address) => {
            const { utils } = require("@chainvue/verus-sdk");
            const script = utils.addressToScriptPubKey(address).toString("hex");
            const result = sdk.transfer({
              wif,
              to: address,
              amount: 90_000_000n,
              utxos: [{ txid: "ab".repeat(32), outputIndex: 0, satoshis: 100_000_000n, script }],
              changeAddress: address,
            });
            if (!/^[0-9a-f]+$/.test(result.signedTx)) throw new Error("no signed hex");
            const summary = utils.summarizeSignedTransaction(result.signedTx, "testnet");
            if (summary.txid !== result.txid) throw new Error("txid mismatch");
            console.log("smoke ok:", result.txid);
          }).catch((err) => { console.error(err); process.exit(1); });
          EOF2
          node smoke.cjs
